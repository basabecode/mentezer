<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MENTEZER — Calma profesional para tu práctica clínica</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#F7F9F9;--paper:#fff;--ink:#2E2E2E;--muted:#607173;--border:#D9E1E2;
  --blue:#3E8197;--blueL:#E8F2F5;
  --green:#7F9B79;--greenL:#EEF4EC;
  --purple:#8BAA95;--purpleL:#F1F6F3;
  --amber:#B4895C;--amberL:#F7EFE6;
  --red:#B56969;
}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
h1,h2,h3,h4{font-family:'Manrope',system-ui,sans-serif;letter-spacing:-0.025em;}
.mono{font-family:'DM Mono',monospace;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;font-family:'DM Sans',system-ui,sans-serif;}

/* Cards */
.card{background:var(--paper);border:1px solid var(--border);border-radius:20px;transition:transform 200ms ease,box-shadow 200ms ease,border-color 200ms ease;}
.card:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(62,129,151,0.10);border-color:rgba(62,129,151,0.22);}

/* Buttons */
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:14px;border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:600;transition:all 180ms;box-shadow:0 10px 24px rgba(62,129,151,0.22);}
.btn-primary:hover{background:#2d6778;transform:translateY(-1px);box-shadow:0 14px 30px rgba(62,129,151,0.30);}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,0.85);color:var(--ink);font-size:13px;font-weight:500;transition:all 180ms;}
.btn-secondary:hover{border-color:rgba(62,129,151,0.3);background:#fff;transform:translateY(-1px);}
.btn-dark{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:14px;border:none;background:var(--ink);color:#fff;font-size:13px;font-weight:600;transition:all 180ms;}
.btn-dark:hover{background:#1a1a1a;transform:translateY(-1px);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@keyframes typeLine{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-1{animation:fadeUp 500ms .05s both cubic-bezier(.22,1,.36,1)}
.fade-2{animation:fadeUp 500ms .12s both cubic-bezier(.22,1,.36,1)}
.fade-3{animation:fadeUp 500ms .2s both cubic-bezier(.22,1,.36,1)}
.fade-4{animation:fadeUp 500ms .28s both cubic-bezier(.22,1,.36,1)}
.type-line{animation:typeLine 400ms both cubic-bezier(.22,1,.36,1)}
.caret{display:inline-block;width:2px;height:1em;background:var(--blue);vertical-align:middle;margin-left:2px;animation:blink 1s steps(1) infinite;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ─── ICONS ─── */
const Ico={
  brain:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-1.04-4.69 3 3 0 0 1 .38-5.74 2.5 2.5 0 0 1 3.12-3.61"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 1.04-4.69 3 3 0 0 0-.38-5.74 2.5 2.5 0 0 0-3.12-3.61"/></svg>,
  arrow:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  check:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  mic:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>,
  book:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
  spark:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3 1.9 4.6L18.5 9l-4.6 1.4L12 15l-1.9-4.6L5.5 9l4.6-1.4L12 3z"/><path d="m19 15 1 2.4 2.5.8-2.5.8L19 21l-1-2-2.5-.8 2.5-.8 1-2.4z"/></svg>,
  lock:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/></svg>,
  shield:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  x:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  menu:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="3" y1="8" x2="21" y2="8"/><line x1="3" y1="16" x2="21" y2="16"/></svg>,
  plus:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  chevDown:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="6 9 12 15 18 9"/></svg>,
};

/* ─── ANIMATED CLINICAL CARD ─── */
const lines=[
  {label:'Subjetivo',text:'Reporta cansancio sostenido, culpa al descansar y dificultad para desconectarse del trabajo al final del día.',tone:{bg:'rgba(255,255,255,0.9)',border:'rgba(217,225,226,0.7)',label:'#607173',text:'#2E2E2E'}},
  {label:'Análisis clínico',text:'La IA detecta autoexigencia como regulador de valor personal y recupera una cita clínica útil para sostener la hipótesis exploratoria.',tone:{bg:'rgba(232,242,245,0.85)',border:'rgba(62,129,151,0.2)',label:'#3E8197',text:'#2E2E2E'}},
  {label:'Próxima sesión',text:'Queda listo un siguiente paso claro: explorar descanso como pérdida de valor y registrar pensamientos automáticos.',tone:{bg:'rgba(238,244,236,0.85)',border:'rgba(127,155,121,0.22)',label:'#7F9B79',text:'#2E2E2E'}},
];
const AnimatedCard=()=>{
  const [step,setStep]=useState(-1);
  const [chars,setChars]=useState(0);
  const [done,setDone]=useState(false);
  useEffect(()=>{
    const t=setTimeout(()=>setStep(0),800);
    return()=>clearTimeout(t);
  },[]);
  useEffect(()=>{
    if(step<0||step>=lines.length)return;
    setChars(0);
    const text=lines[step].text;
    let i=0;
    const t=setInterval(()=>{i+=2;setChars(i);if(i>=text.length){clearInterval(t);setTimeout(()=>{if(step<lines.length-1)setStep(s=>s+1);else setDone(true);},700);}},28);
    return()=>clearInterval(t);
  },[step]);
  return(
    <div style={{background:'linear-gradient(160deg,rgba(62,129,151,0.55) 0%,rgba(74,144,164,0.32) 25%,rgba(232,242,245,0.92) 55%,#fff 100%)',borderRadius:22,border:'1px solid rgba(217,225,226,0.8)',padding:20,boxShadow:'0 24px 56px rgba(62,129,151,0.15)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:14,borderBottom:'1px solid rgba(217,225,226,0.6)',marginBottom:14}}>
        <div>
          <div className="mono" style={{fontSize:9,letterSpacing:'0.3em',textTransform:'uppercase',color:'rgba(255,255,255,0.75)',marginBottom:4}}>MENTEZER · Espacio Clínico</div>
          <div style={{fontFamily:'Manrope',fontSize:16,fontWeight:700,color:'#fff'}}>Ana R. · Sesión 8 · TCC</div>
        </div>
        <div style={{background:'rgba(255,255,255,0.8)',borderRadius:20,padding:'5px 12px',fontSize:10,fontWeight:700,color:'#3E8197',border:'1px solid rgba(217,225,226,0.6)',letterSpacing:'0.05em',textTransform:'uppercase'}}>Respuesta IA</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {lines.map((l,i)=>(
          <div key={i} style={{
            background:step>=i?l.tone.bg:'rgba(255,255,255,0.3)',
            border:`1px solid ${step>=i?l.tone.border:'rgba(217,225,226,0.3)'}`,
            borderRadius:14,padding:'10px 12px',
            opacity:step>=i?1:0.35,transition:'opacity 300ms,background 300ms',
            minHeight:56,
          }}>
            <div className="mono" style={{fontSize:8,letterSpacing:'0.25em',textTransform:'uppercase',color:l.tone.label,marginBottom:5}}>{l.label}</div>
            <div style={{fontSize:12,lineHeight:1.55,color:l.tone.text}}>
              {step===i?l.text.slice(0,chars)+(chars<l.text.length?'':''): step>i?l.text:''}
              {step===i&&chars<l.text.length&&<span className="caret"/>}
            </div>
          </div>
        ))}
      </div>
      {done&&(
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:12,alignItems:'center'}}>
          <span style={{background:'#F7EFE6',color:'#2E2E2E',borderRadius:20,padding:'4px 10px',fontSize:10,fontWeight:600}}>Antes: 45 min</span>
          <span style={{background:'#E8F2F5',color:'#2E2E2E',borderRadius:20,padding:'4px 10px',fontSize:10,fontWeight:600}}>Ahora: 28 seg.</span>
          <span style={{fontSize:11,color:'#7F9B79',fontWeight:600}}>✓ Listo para cerrar</span>
        </div>
      )}
    </div>
  );
};

/* ─── FAQ ITEM ─── */
const FaqItem=({q,a})=>{
  const [open,setOpen]=useState(false);
  return(
    <div style={{border:`1px solid ${open?'rgba(62,129,151,0.22)':'#D9E1E2'}`,borderRadius:16,overflow:'hidden',transition:'border-color 200ms'}}>
      <button onClick={()=>setOpen(!open)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 18px',background:open?'#E8F2F5':'#fff',border:'none',textAlign:'left',gap:12}}>
        <span style={{fontFamily:'Manrope',fontSize:14,fontWeight:600,color:'#2E2E2E'}}>{q}</span>
        <span style={{flexShrink:0,color:'#3E8197',transform:open?'rotate(180deg)':'',transition:'transform 200ms'}}>{Ico.chevDown}</span>
      </button>
      {open&&<div style={{padding:'0 18px 16px',fontSize:13,color:'#607173',lineHeight:1.65,background:'#fff'}}>{a}</div>}
    </div>
  );
};

/* ─── MAIN APP ─── */
const App=()=>{
  const [mobileOpen,setMobileOpen]=useState(false);
  const [tweakOpen,setTweakOpen]=useState(false);

  useEffect(()=>{
    window.addEventListener('message',e=>{
      if(e.data?.type==='__activate_edit_mode') setTweakOpen(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweakOpen(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');
  },[]);

  const faqs=[
    {q:'¿Esto reemplaza mi criterio clínico?',a:'No. Esa parte no se negocia. MENTEZER organiza, recupera contexto y te ayuda a cerrar mejor la sesión. La decisión sigue siendo tuya.'},
    {q:'¿La prueba de 14 días pide tarjeta?',a:'No. La idea es validar uso real sin meter una barrera al principio. Si al día 14 no cambió nada, no gastas nada.'},
    {q:'¿Puedo trabajar con mis propios libros?',a:'Sí. Ese es uno de los puntos fuertes. La plataforma no te obliga a pensar como otro profesional — usas tus referencias.'},
    {q:'¿Es seguro para información clínica sensible?',a:'Sí. Audio cifrado AES-256, trazabilidad completa y estructura pensada para cumplir con estándares regulatorios LATAM y GDPR.'},
  ];

  const deliverables=[
    {icon:Ico.mic,kicker:'Registro base',title:'Sesión capturada',copy:'Grabas o subes audio y el caso queda listo para trabajarse sin reconstruir desde memoria.',tech:'Audio cifrado · timeline clínico · paciente vinculado',color:'#3E8197',bg:'#E8F2F5'},
    {icon:Ico.book,kicker:'Rigor clínico',title:'Soporte bibliográfico',copy:'El análisis trae citas de los libros que usas, con autor y página, dentro del mismo flujo.',tech:'Autor y página · búsqueda contextual · biblioteca activa',color:'#B4895C',bg:'#F7EFE6'},
    {icon:Ico.spark,kicker:'Acción siguiente',title:'Decisión clínica',copy:'Patrón central, hipótesis exploratoria y próximo paso en una estructura que sí sirve para actuar.',tech:'Hipótesis · riesgo · próxima sesión',color:'#7F9B79',bg:'#EEF4EC'},
    {icon:Ico.lock,kicker:'Confianza institucional',title:'Privacidad clínica',copy:'Audio cifrado, trazabilidad y estructura pensada para información sensible.',tech:'AES-256 · acceso controlado · trazabilidad',color:'#607173',bg:'#F7F9F9'},
  ];

  const plans=[
    {name:'Lite',price:'$19',desc:'Consulta privada. Orden sin complicaciones.',features:['Notas SOAP/DAP con IA','3 enfoques clínicos activos','Biblioteca base de 126 libros','Prueba 14 días gratis'],highlight:false},
    {name:'Pro',price:'$49',desc:'Documentación avanzada para clínicos exigentes.',features:['Todo lo de Lite','Grabación y transcripción','AIReport profundo con CIE-11','Informes de derivación en PDF'],highlight:true},
    {name:'Clinic',price:'$149',desc:'Para consultorios y equipos con operación compartida.',features:['Hasta 5 profesionales','Panel administrativo','Facturación unificada','Onboarding dedicado'],highlight:false},
  ];

  return(
    <div style={{minHeight:'100vh',background:'#F7F9F9'}}>

      {/* ─── NAV ─── */}
      <nav style={{position:'fixed',top:14,left:'50%',transform:'translateX(-50%)',zIndex:100,width:'min(100% - 32px, 1100px)'}}>
        <div style={{background:'rgba(255,255,255,0.92)',backdropFilter:'blur(20px)',border:'1px solid #D9E1E2',borderRadius:22,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',boxShadow:'0 4px 28px rgba(62,129,151,0.08)'}}>
          {/* Logo */}
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:12,background:'#E8F2F5',display:'flex',alignItems:'center',justifyContent:'center',color:'#3E8197'}}>{Ico.brain}</div>
            <div>
              <div style={{fontFamily:'Manrope',fontSize:14,fontWeight:800,color:'#2E2E2E',letterSpacing:'-0.02em'}}>MENTEZER</div>
              <div style={{fontFamily:'DM Sans',fontSize:10,color:'#607173',lineHeight:1}}>Calma profesional para tu práctica clínica</div>
            </div>
          </div>
          {/* Links */}
          <div style={{display:'flex',alignItems:'center',gap:2,background:'rgba(247,249,249,0.8)',border:'1px solid #D9E1E2',borderRadius:20,padding:4}}>
            {['Demostración','Problema','Cómo funciona','Precios'].map(l=>(
              <a key={l} href={`#${l.toLowerCase().replace(/\s+/g,'-').replace('ó','o').replace('é','e')}`} style={{padding:'7px 14px',borderRadius:14,fontSize:12,fontWeight:500,color:'#607173',whiteSpace:'nowrap',transition:'all 160ms'}}
              onMouseEnter={e=>{e.target.style.background='#fff';e.target.style.color='#2E2E2E';}}
              onMouseLeave={e=>{e.target.style.background='';e.target.style.color='#607173';}}
              >{l}</a>
            ))}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <a href="#" style={{fontSize:12,color:'#607173',padding:'8px 14px',fontWeight:500}}>Ingresar</a>
            <button className="btn-primary" style={{padding:'9px 18px',fontSize:12,borderRadius:12}}>Prueba 14 días {Ico.arrow}</button>
          </div>
        </div>
      </nav>

      {/* ─── HERO ─── */}
      <section style={{paddingTop:110,paddingBottom:48,paddingLeft:24,paddingRight:24,background:'#F7F9F9'}}>
        <div style={{maxWidth:1100,margin:'0 auto',display:'grid',gridTemplateColumns:'1fr 420px',gap:48,alignItems:'center'}}>
          <div className="fade-1">
            <div style={{display:'inline-flex',alignItems:'center',gap:7,background:'#E8F2F5',border:'1px solid rgba(62,129,151,0.2)',borderRadius:20,padding:'6px 12px',marginBottom:20}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:'#7F9B79',animation:'pulse 2s ease-in-out infinite'}}/>
              <span className="mono" style={{fontSize:9,letterSpacing:'0.3em',textTransform:'uppercase',color:'#3E8197',fontWeight:500}}>En acceso anticipado</span>
            </div>
            <h1 style={{fontFamily:'Manrope',fontSize:52,fontWeight:800,lineHeight:1.05,color:'#2E2E2E',marginBottom:18,maxWidth:520}}>
              Una interfaz clínica serena para atender, registrar y analizar.
            </h1>
            <p style={{fontSize:15,color:'#607173',lineHeight:1.7,maxWidth:430,marginBottom:24}}>
              MENTEZER organiza tu práctica con una experiencia visual ligera y profesional. Menos fricción, más foco clínico.
            </p>
            {/* Clarity points */}
            <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:28}}>
              {['Analiza sesiones con tu biblioteca clínica','Te ayuda a cerrar mejor el día','No reemplaza tu criterio profesional'].map(p=>(
                <div key={p} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 14px',borderRadius:12,border:'1px solid #D9E1E2',background:'rgba(255,255,255,0.78)',fontSize:13,color:'#2E2E2E'}}>
                  <span style={{color:'#7F9B79',flexShrink:0}}>{Ico.check}</span>{p}
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn-primary">Activar prueba de 14 días {Ico.arrow}</button>
              <button className="btn-secondary">{Ico.spark} Ver demostración</button>
            </div>
          </div>
          <div className="fade-2"><AnimatedCard/></div>
        </div>

        {/* Quick facts strip */}
        <div className="fade-3" style={{maxWidth:1100,margin:'36px auto 0',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,background:'#fff',border:'1px solid #D9E1E2',borderRadius:18,padding:'16px 24px',boxShadow:'0 4px 24px rgba(62,129,151,0.06)'}}>
          {[{v:'14 días',l:'de prueba real, sin tarjeta'},{v:'5 min',l:'para dejar lista la cuenta'},{v:'< 2 min',l:'para reporte post-sesión'},{v:'Privacidad',l:'estándar regulatorio LATAM y GDPR'}].map((f,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'4px 0'}}>
              <div style={{fontFamily:'Manrope',fontSize:20,fontWeight:800,color:'#2E2E2E',flexShrink:0}}>{f.v}</div>
              <div style={{fontSize:11,color:'#607173',lineHeight:1.4}}>{f.l}</div>
            </div>
          ))}
        </div>
      </section>

      {/* ─── PAIN POINTS ─── */}
      <section id="problema" style={{background:'#fff',padding:'64px 24px'}}>
        <div style={{maxWidth:1100,margin:'0 auto'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:48,alignItems:'start'}}>
            <div>
              <div className="mono" style={{fontSize:9,letterSpacing:'0.3em',textTransform:'uppercase',color:'#B4895C',marginBottom:12}}>Seguir igual tiene costo</div>
              <h2 style={{fontFamily:'Manrope',fontSize:34,fontWeight:800,lineHeight:1.1,color:'#2E2E2E',marginBottom:14}}>El atraso se ve como cansancio acumulado.</h2>
              <p style={{fontSize:13,color:'#607173',lineHeight:1.65}}>Tu forma de trabajar ya merece una estructura mejor que libreta, notas sueltas y memoria diferida.</p>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
              {[
                {n:'01',t:'Las notas se quedan para la noche',d:'Tu jornada termina tarde porque la sesión no termina cuando el paciente sale.'},
                {n:'02',t:'Tu criterio llega sin apoyo a tiempo',d:'Los autores que usas no están a la mano cuando necesitas ordenar lo ocurrido.'},
                {n:'03',t:'Agenda y WhatsApp piden relevo',d:'Cuando crecen los pacientes, ese sistema empieza a cobrarte en orden y energía.'},
              ].map(p=>(
                <div key={p.n} className="card" style={{padding:'20px 18px'}}>
                  <div className="mono" style={{fontSize:10,color:'#B4895C',fontWeight:500,marginBottom:12}}>{p.n}</div>
                  <h3 style={{fontFamily:'Manrope',fontSize:15,fontWeight:700,color:'#2E2E2E',marginBottom:10,lineHeight:1.25}}>{p.t}</h3>
                  <p style={{fontSize:12,color:'#607173',lineHeight:1.6}}>{p.d}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      {/* ─── DELIVERABLES bento ─── */}
      <section id="como-funciona" style={{background:'#F1F6F3',padding:'64px 24px'}}>
        <div style={{maxWidth:1100,margin:'0 auto'}}>
          {/* Header row */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:32,alignItems:'start',marginBottom:32}}>
            <div>
              <div className="mono" style={{fontSize:9,letterSpacing:'0.3em',textTransform:'uppercase',color:'#7F9B79',marginBottom:12}}>Lo que recibes</div>
              <h2 style={{fontFamily:'Manrope',fontSize:34,fontWeight:800,lineHeight:1.1,color:'#2E2E2E'}}>Sales de una sesión con material para actuar, no con tareas pendientes.</h2>
            </div>
            <div style={{background:'#2E2E2E',borderRadius:20,padding:'22px 24px',color:'#fff'}}>
              <div className="mono" style={{fontSize:9,letterSpacing:'0.3em',textTransform:'uppercase',color:'rgba(255,255,255,0.35)',marginBottom:14}}>Lo que compra el clínico</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {['Una estructura que ordena el cierre clínico en tiempo real.','Soporte bibliográfico visible, no escondido.','Una plataforma que parece herramienta profesional frente al paciente.'].map((p,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 12px',borderRadius:12,border:'1px solid rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.04)',fontSize:12,color:'rgba(255,255,255,0.75)',lineHeight:1.55}}>
                    <span style={{color:'#7F9B79',flexShrink:0,marginTop:1}}>{Ico.check}</span>{p}
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Bento grid */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
            {deliverables.map((d,i)=>(
              <div key={i} className="card" style={{padding:'20px 18px',position:'relative',overflow:'hidden'}}>
                <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:d.color,opacity:.7,borderRadius:'20px 20px 0 0'}}/>
                <div style={{width:40,height:40,borderRadius:12,background:d.bg,display:'flex',alignItems:'center',justifyContent:'center',color:d.color,marginBottom:14}}>{d.icon}</div>
                <div className="mono" style={{fontSize:8,letterSpacing:'0.2em',textTransform:'uppercase',color:'#607173',marginBottom:6}}>{d.kicker}</div>
                <h3 style={{fontFamily:'Manrope',fontSize:15,fontWeight:700,color:'#2E2E2E',marginBottom:8,lineHeight:1.2}}>{d.title}</h3>
                <p style={{fontSize:12,color:'#607173',lineHeight:1.6,marginBottom:12}}>{d.copy}</p>
                <div style={{background:'#F7F9F9',borderRadius:10,padding:'8px 10px',border:'1px solid #D9E1E2'}}>
                  <div className="mono" style={{fontSize:8,color:'#607173',letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:3}}>Señal técnica</div>
                  <div style={{fontSize:10,color:'#607173',lineHeight:1.5}}>{d.tech}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ─── TRIAL STEPS — horizontal timeline ─── */}
      <section style={{background:'#fff',padding:'64px 24px'}}>
        <div style={{maxWidth:1100,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:32,gap:32}}>
            <div>
              <div className="mono" style={{fontSize:9,letterSpacing:'0.3em',textTransform:'uppercase',color:'#B4895C',marginBottom:10}}>La prueba importa</div>
              <h2 style={{fontFamily:'Manrope',fontSize:34,fontWeight:800,color:'#2E2E2E',lineHeight:1.1,maxWidth:480}}>14 días para ver si tu práctica ya pidió este cambio.</h2>
            </div>
            <button className="btn-primary" style={{flexShrink:0}}>Activar prueba gratis {Ico.arrow}</button>
          </div>
          {/* Timeline */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:0,position:'relative'}}>
            <div style={{position:'absolute',top:28,left:'12.5%',right:'12.5%',height:1,background:'linear-gradient(90deg,#3E8197,#7F9B79)',opacity:.3}}/>
            {[{day:'Día 1',t:'Cargas tu primer caso real',d:'Entras con material verdadero y ves rápido si encaja.'},{day:'Día 3',t:'Comparas cómo cierras una sesión',d:'Aparece la diferencia entre escribir tarde y salir con una base armada.'},{day:'Día 7',t:'Se nota el orden',d:'Tu consulta empieza a sentirse más moderna y consistente.'},{day:'Día 14',t:'Decides con criterio propio',d:'No compras por una promesa. Compras porque ya viste si quitó carga real.'}].map((s,i)=>(
              <div key={i} style={{padding:'0 16px',textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center'}}>
                <div style={{width:56,height:56,borderRadius:'50%',background:i===3?'#2E2E2E':'#E8F2F5',border:`2px solid ${i===3?'#2E2E2E':'rgba(62,129,151,0.2)'}`,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14,flexShrink:0,zIndex:1}}>
                  <div className="mono" style={{fontSize:10,fontWeight:700,color:i===3?'#fff':'#3E8197'}}>{s.day}</div>
                </div>
                <h3 style={{fontFamily:'Manrope',fontSize:14,fontWeight:700,color:'#2E2E2E',marginBottom:6,lineHeight:1.2}}>{s.t}</h3>
                <p style={{fontSize:11,color:'#607173',lineHeight:1.55}}>{s.d}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ─── PARA QUIÉN + PRICING (same section, 2-col) ─── */}
      <section id="planes" style={{background:'#F1F6F3',padding:'64px 24px'}}>
        <div style={{maxWidth:1100,margin:'0 auto'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:32,alignItems:'start',marginBottom:32}}>
            <div>
              <div className="mono" style={{fontSize:9,letterSpacing:'0.3em',textTransform:'uppercase',color:'#7F9B79',marginBottom:12}}>Para quién encaja</div>
              <h2 style={{fontFamily:'Manrope',fontSize:28,fontWeight:800,color:'#2E2E2E',lineHeight:1.15,marginBottom:16}}>No hace falta ser fan de la tecnología. Hace falta estar cansado de perder tiempo.</h2>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {[
                  {t:'Psicólogo clínico individual',d:'Agenda llena, cierre tardío. Aquí ganas claridad y tiempo sin perder criterio.'},
                  {t:'Consultorio que quiere verse más serio',d:'El paciente siente orden y velocidad — percibe una práctica más confiable.'},
                  {t:'Equipo que ya no quiere operar por WhatsApp',d:'Si varias personas tocan agenda y reportes, necesitas sistema. No parches.'},
                ].map((p,i)=>(
                  <div key={i} style={{padding:'14px 16px',borderRadius:16,border:'1px solid #D9E1E2',background:'#fff',borderLeft:`3px solid #3E8197`,transition:'all 200ms'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderLeftColor='#7F9B79';e.currentTarget.style.boxShadow='0 8px 24px rgba(62,129,151,0.08)';}}
                  onMouseLeave={e=>{e.currentTarget.style.borderLeftColor='#3E8197';e.currentTarget.style.boxShadow='none';}}>
                    <div style={{fontFamily:'Manrope',fontSize:13,fontWeight:700,color:'#2E2E2E',marginBottom:3}}>{p.t}</div>
                    <div style={{fontSize:11,color:'#607173',lineHeight:1.5}}>{p.d}</div>
                  </div>
                ))}
              </div>
            </div>
            {/* Pricing */}
            <div>
              <div className="mono" style={{fontSize:9,letterSpacing:'0.3em',textTransform:'uppercase',color:'#7F9B79',marginBottom:12}}>Precios</div>
              <h2 style={{fontFamily:'Manrope',fontSize:28,fontWeight:800,color:'#2E2E2E',lineHeight:1.15,marginBottom:16}}>Empieza con prueba real. Paga solo si ya te ordenó la práctica.</h2>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
                {plans.map((p,i)=>(
                  <div key={i} style={{
                    background:p.highlight?'#2E2E2E':'#fff',
                    border:`1px solid ${p.highlight?'#2E2E2E':'#D9E1E2'}`,
                    borderRadius:20,padding:'22px 18px',
                    boxShadow:p.highlight?'0 20px 48px rgba(46,46,46,0.2)':'0 4px 16px rgba(62,129,151,0.06)',
                    position:'relative',overflow:'hidden',
                    display:'flex',flexDirection:'column',
                  }}>
                    {p.highlight&&<div style={{position:'absolute',top:0,left:0,right:0,height:2,background:'linear-gradient(90deg,#3E8197,#7F9B79)'}}/>}
                    {p.highlight&&<div style={{position:'absolute',top:14,right:14,background:'#7F9B79',borderRadius:20,padding:'3px 10px',fontSize:9,fontWeight:700,color:'#fff',letterSpacing:'0.05em'}}>POPULAR</div>}
                    <div style={{fontFamily:'DM Mono',fontSize:10,letterSpacing:'0.2em',textTransform:'uppercase',color:p.highlight?'rgba(255,255,255,0.4)':'#607173',marginBottom:8}}>{p.name}</div>
                    <div style={{fontFamily:'Manrope',fontSize:36,fontWeight:800,color:p.highlight?'#fff':'#2E2E2E',lineHeight:1,marginBottom:4}}>
                      {p.price}<span style={{fontSize:12,fontWeight:400,opacity:.55}}>/mes</span>
                    </div>
                    <div style={{fontSize:11,color:p.highlight?'rgba(255,255,255,0.55)':'#607173',marginBottom:16,lineHeight:1.5}}>{p.desc}</div>
                    <div style={{flex:1,display:'flex',flexDirection:'column',gap:7,marginBottom:18}}>
                      {p.features.map((f,j)=>(
                        <div key={j} style={{display:'flex',alignItems:'flex-start',gap:8,fontSize:11,color:p.highlight?'rgba(255,255,255,0.75)':'#607173',lineHeight:1.4}}>
                          <span style={{color:p.highlight?'#7F9B79':'#3E8197',marginTop:1,flexShrink:0}}>{Ico.check}</span>{f}
                        </div>
                      ))}
                    </div>
                    <button style={{
                      width:'100%',padding:'10px',borderRadius:12,border:'none',
                      background:p.highlight?'#fff':'#E8F2F5',
                      color:p.highlight?'#2E2E2E':'#3E8197',
                      fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'Manrope',
                      transition:'all 180ms',
                    }}
                    onMouseEnter={e=>{e.target.style.background=p.highlight?'#E8F2F5':'#3E8197';e.target.style.color=p.highlight?'#3E8197':'#fff';}}
                    onMouseLeave={e=>{e.target.style.background=p.highlight?'#fff':'#E8F2F5';e.target.style.color=p.highlight?'#2E2E2E':'#3E8197';}}>
                      {p.highlight?'Empezar ahora':'Probar gratis'}
                    </button>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ─── FAQ ─── */}
      <section style={{background:'#fff',padding:'64px 24px'}}>
        <div style={{maxWidth:1100,margin:'0 auto',display:'grid',gridTemplateColumns:'1fr 2fr',gap:48,alignItems:'start'}}>
          <div>
            <div className="mono" style={{fontSize:9,letterSpacing:'0.3em',textTransform:'uppercase',color:'#607173',marginBottom:12}}>Preguntas frecuentes</div>
            <h2 style={{fontFamily:'Manrope',fontSize:28,fontWeight:800,color:'#2E2E2E',lineHeight:1.1,marginBottom:14}}>Lo que suele aparecer antes de empezar.</h2>
            <p style={{fontSize:12,color:'#607173',lineHeight:1.65}}>Si la respuesta que buscas no está aquí, escríbenos y te respondemos en el mismo día.</p>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {faqs.map((f,i)=><FaqItem key={i} q={f.q} a={f.a}/>)}
          </div>
        </div>
      </section>

      {/* ─── FINAL CTA ─── */}
      <section style={{background:'linear-gradient(135deg,#2E2E2E 0%,#1a2e36 60%,#1a2e2a 100%)',padding:'64px 24px'}}>
        <div style={{maxWidth:800,margin:'0 auto',textAlign:'center'}}>
          <div className="mono" style={{fontSize:9,letterSpacing:'0.35em',textTransform:'uppercase',color:'rgba(255,255,255,0.35)',marginBottom:16}}>Sin tarjeta · Sin riesgo · 14 días reales</div>
          <h2 style={{fontFamily:'Manrope',fontSize:44,fontWeight:800,color:'#fff',lineHeight:1.05,marginBottom:16}}>Estos 14 días son el momento para ver si tu práctica ya pidió este cambio.</h2>
          <p style={{fontSize:14,color:'rgba(255,255,255,0.55)',lineHeight:1.65,marginBottom:32,maxWidth:480,margin:'0 auto 32px'}}>No compras por una promesa bonita. Pruebas primero. Si no cambia nada real, no gastas nada.</p>
          <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
            <button className="btn-primary" style={{padding:'14px 28px',fontSize:14,borderRadius:16}}>Activar prueba de 14 días {Ico.arrow}</button>
            <button className="btn-secondary" style={{padding:'14px 28px',fontSize:14,borderRadius:16}}>{Ico.spark} Ver demostración</button>
          </div>
        </div>
      </section>

      {/* ─── FOOTER ─── */}
      <footer style={{background:'#2E2E2E',borderTop:'1px solid rgba(255,255,255,0.06)',padding:'24px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:28,height:28,borderRadius:9,background:'#E8F2F5',display:'flex',alignItems:'center',justifyContent:'center',color:'#3E8197'}}>{Ico.brain}</div>
          <span style={{fontFamily:'Manrope',fontSize:12,fontWeight:700,color:'rgba(255,255,255,0.5)'}}>MENTEZER</span>
        </div>
        <div style={{display:'flex',gap:20}}>
          {['Privacidad','Términos','Contacto'].map(l=><a key={l} style={{fontSize:11,color:'rgba(255,255,255,0.3)',cursor:'pointer'}}>{l}</a>)}
        </div>
        <div className="mono" style={{fontSize:10,color:'rgba(255,255,255,0.2)'}}>© 2026 Mentezer</div>
      </footer>

      {/* TWEAKS */}
      {tweakOpen&&(
        <div style={{position:'fixed',bottom:24,right:24,zIndex:200,background:'#fff',border:'1px solid #D9E1E2',borderRadius:18,padding:18,width:200,boxShadow:'0 16px 44px rgba(62,129,151,0.14)'}}>
          <div style={{fontFamily:'Manrope',fontSize:13,fontWeight:700,color:'#2E2E2E',marginBottom:14}}>Tweaks</div>
          <div style={{fontSize:11,color:'#607173'}}>La landing no tiene tweaks configurados todavía. Puedes ajustar colores directamente en el dashboard.</div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
