<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mentezer — Panel Clínico</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#F7F9F9;--paper:#fff;--ink:#2E2E2E;--muted:#607173;--border:#D9E1E2;
  --blue:#3E8197;--blueL:#E8F2F5;
  --green:#7F9B79;--greenL:#EEF4EC;
  --purple:#8BAA95;--purpleL:#F1F6F3;
  --amber:#B4895C;--amberL:#F7EFE6;
  --red:#B56969;--redL:#F8EDED;
}
html,body,#root{height:100%;overflow:hidden;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--ink);color:var(--ink);-webkit-font-smoothing:antialiased;}
.mono{font-family:'DM Mono',monospace;}
.serif{font-family:'Manrope',system-ui,sans-serif;}
/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(62,129,151,.2);border-radius:4px;}
.noscroll::-webkit-scrollbar{display:none;}
.noscroll{scrollbar-width:none;}

/* Hardware recorder surface */
.hw-body{
  background:linear-gradient(160deg,#1e2022 0%,#17191b 40%,#111314 100%);
  border:1px solid rgba(255,255,255,.06);
  position:relative;
}
.hw-body::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.008) 2px,rgba(255,255,255,.008) 4px);
  pointer-events:none;
}
.hw-btn{
  cursor:pointer;border:none;font-family:'DM Mono',monospace;
  background:linear-gradient(180deg,#2e3133 0%,#22262a 100%);
  box-shadow:0 3px 0 #0d0f10, 0 1px 4px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.08);
  border-radius:8px;color:rgba(255,255,255,.65);transition:all 120ms;
  border:1px solid rgba(255,255,255,.06);
}
.hw-btn:active,.hw-btn.pressed{
  transform:translateY(2px);
  box-shadow:0 1px 0 #0d0f10, inset 0 2px 4px rgba(0,0,0,.5);
}
.hw-btn-primary{
  background:linear-gradient(180deg,#c0392b 0%,#962d22 100%);
  box-shadow:0 3px 0 #4a1510, 0 1px 6px rgba(192,57,43,.4), inset 0 1px 0 rgba(255,100,80,.25);
  color:#fff;
}
.hw-btn-primary:active{box-shadow:0 1px 0 #4a1510,inset 0 2px 4px rgba(0,0,0,.4);}
.hw-btn-blue{
  background:linear-gradient(180deg,#3E8197 0%,#2d6778 100%);
  box-shadow:0 3px 0 #1a3d49, 0 1px 6px rgba(62,129,151,.35), inset 0 1px 0 rgba(120,200,220,.2);
  color:#fff;
}
.hw-btn-blue:active{box-shadow:0 1px 0 #1a3d49,inset 0 2px 4px rgba(0,0,0,.4);}
.led{
  width:8px;height:8px;border-radius:50%;
  box-shadow:0 0 6px 2px currentColor;
}
.led-green{color:#4ade80;background:#4ade80;}
.led-red{color:#f87171;background:#f87171;}
.led-amber{color:#fb923c;background:#fb923c;}
.led-off{color:transparent;background:#2a2a2a;box-shadow:none;}
.seg-display{
  font-family:'DM Mono',monospace;
  background:#0a0d0a;
  border:1px solid rgba(0,0,0,.6);
  border-radius:6px;
  color:#00ff88;
  text-shadow:0 0 8px rgba(0,255,136,.7);
  letter-spacing:.12em;
}
.vu-bar{border-radius:2px;transition:height 80ms ease;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ledBlink{0%,49%{opacity:1}50%,100%{opacity:.15}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp 350ms cubic-bezier(.22,1,.36,1) both}
.fade2{animation:fadeUp 350ms 50ms cubic-bezier(.22,1,.36,1) both}
.fade3{animation:fadeUp 350ms 100ms cubic-bezier(.22,1,.36,1) both}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useRef, useCallback } = React;

/* ─── PALETTE ─── */
const C = {
  cream: '#F7F9F9', paper: '#fff', ink: '#2E2E2E', muted: '#607173', border: '#D9E1E2',
  blue: '#3E8197', blueL: '#E8F2F5', blueD: '#2d6778',
  green: '#7F9B79', greenL: '#EEF4EC',
  amber: '#B4895C', amberL: '#F7EFE6',
  red: '#B56969', redL: '#F8EDED',
  purple: '#8BAA95', purpleL: '#F1F6F3',
  sidebarBg: '#1a1d1f',
  sidebarActive: 'rgba(62,129,151,0.18)'
};

/* ─── INLINE SVG ICONS ─── */
const SVG = {

  patients: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>,
  mic: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2" /><line x1="12" y1="19" x2="12" y2="23" /><line x1="8" y1="23" x2="16" y2="23" /></svg>,
  book: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" /><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" /></svg>,
  calendar: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></svg>,
  dollar: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23" /><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" /></svg>,
  file: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /></svg>,
  cases: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></svg>,
  chevron: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6" /></svg>,
  plus: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>,
  search: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>,
  brain: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2a5 5 0 0 1 5 5v.5M14.5 2a5 5 0 0 0-5 5v.5M5 9.5A4.5 4.5 0 0 0 9.5 14H10M19 9.5A4.5 4.5 0 0 1 14.5 14H14M10 14v5a2 2 0 0 1-2 2H7M14 14v5a2 2 0 0 0 2 2h1" /></svg>,
  settings: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>,
  upload: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 16 12 12 8 16" /><line x1="12" y1="12" x2="12" y2="21" /><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" /></svg>,
  arrowLeft: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></svg>,
  bell: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" /></svg>,
  x: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
  sparkle: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l1.09 3.26L16.5 6l-3.41 1.74L12 11l-1.09-3.26L7.5 6l3.41-1.74z" /><path d="M4.5 14l.7 2.1 2.1.7-2.1.7-.7 2.1-.7-2.1-2.1-.7 2.1-.7z" /></svg>
};

/* ─── NAV ITEMS ─── */
const NAV = [
{ id: 'dashboard', icon: 'home', label: 'Inicio' },
{ id: 'patients', icon: 'patients', label: 'Pacientes' },
{ id: 'sessions', icon: 'mic', label: 'Sesión' },
{ id: 'knowledge', icon: 'book', label: 'Biblioteca' },
{ id: 'schedule', icon: 'calendar', label: 'Agenda' },
{ id: 'finance', icon: 'dollar', label: 'Finanzas' },
{ id: 'reports', icon: 'file', label: 'Informes' },
{ id: 'cases', icon: 'cases', label: 'Casos' }];


const PATIENTS = [
{ id: '1', name: 'Mario Salcedo', tag: 'Alta reciente', initials: 'MS' },
{ id: '2', name: 'Ana Rodríguez', tag: 'Sesión 8 · TCC', initials: 'AR' },
{ id: '3', name: 'Carlos Mejía', tag: 'Seguimiento mensual', initials: 'CM' },
{ id: '4', name: 'Lucía Vargas', tag: 'En pausa', initials: 'LV' }];


/* ─── SIDEBAR ─── */
const Sidebar = ({ screen, setScreen, collapsed, setCollapsed }) => {
  const W = collapsed ? 68 : 220;
  return (
    <aside style={{
      width: W, minWidth: W, height: '100%', background: C.sidebarBg,
      display: 'flex', flexDirection: 'column',
      borderRight: '1px solid rgba(255,255,255,0.05)',
      transition: 'width 260ms cubic-bezier(.22,1,.36,1), min-width 260ms cubic-bezier(.22,1,.36,1)',
      overflow: 'hidden', flexShrink: 0,
      position: 'relative', zIndex: 10
    }}>
      {/* Logo */}
      <div style={{ padding: collapsed ? '20px 0' : '20px 18px', display: 'flex', alignItems: 'center', gap: 10, height: 64, borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
        <div style={{ width: 32, height: 32, borderRadius: 10, background: C.blue, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginLeft: collapsed ? 18 : 0 }}>
          {SVG.brain}
        </div>
        {!collapsed && <span style={{ fontFamily: 'Manrope', fontWeight: 800, fontSize: 14, color: '#fff', letterSpacing: '-0.02em', whiteSpace: 'nowrap' }}>MENTEZER</span>}
      </div>

      {/* Nav */}
      <nav style={{ flex: 1, padding: '10px 8px', overflowY: 'auto', overflowX: 'hidden' }} className="noscroll">
        {NAV.map(({ id, icon, label }) => {
          const active = screen === id;
          return (
            <button key={id} onClick={() => setScreen(id)} title={collapsed ? label : ''} style={{
              width: '100%', display: 'flex', alignItems: 'center', gap: 12,
              padding: collapsed ? '11px 0' : '11px 12px', paddingLeft: collapsed ? 0 : 12,
              borderRadius: 12, border: 'none', cursor: 'pointer', marginBottom: 2,
              background: active ? 'rgba(62,129,151,0.2)' : 'transparent',
              color: active ? C.blue : 'rgba(255,255,255,0.45)',
              transition: 'all 160ms', justifyContent: collapsed ? 'center' : 'flex-start'
            }}
            onMouseEnter={(e) => {if (!active) {e.currentTarget.style.background = 'rgba(255,255,255,0.06)';e.currentTarget.style.color = 'rgba(255,255,255,0.8)';}}}
            onMouseLeave={(e) => {if (!active) {e.currentTarget.style.background = 'transparent';e.currentTarget.style.color = 'rgba(255,255,255,0.45)';}}}>
              
              <span style={{ flexShrink: 0, display: 'flex' }}>{SVG[icon]}</span>
              {!collapsed && <span style={{ fontFamily: 'DM Sans', fontSize: 13, fontWeight: active ? 600 : 400, whiteSpace: 'nowrap' }}>{label}</span>}
              {!collapsed && active && <span style={{ marginLeft: 'auto' }}>{SVG.chevron}</span>}
            </button>);

        })}
      </nav>

      {/* Collapse + profile */}
      <div style={{ borderTop: '1px solid rgba(255,255,255,0.05)', padding: '12px 8px' }}>
        <button onClick={() => setCollapsed(!collapsed)} style={{
          width: '100%', display: 'flex', alignItems: 'center', justifyContent: collapsed ? 'center' : 'flex-start',
          gap: 10, padding: collapsed ? '10px 0' : '10px 12px',
          borderRadius: 12, border: 'none', cursor: 'pointer',
          background: 'transparent', color: 'rgba(255,255,255,0.3)',
          transition: 'all 160ms'
        }}
        onMouseEnter={(e) => {e.currentTarget.style.background = 'rgba(255,255,255,0.06)';e.currentTarget.style.color = 'rgba(255,255,255,0.7)';}}
        onMouseLeave={(e) => {e.currentTarget.style.background = 'transparent';e.currentTarget.style.color = 'rgba(255,255,255,0.3)';}}>
          
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="3" width="18" height="18" rx="2" /><line x1="9" y1="3" x2="9" y2="21" /></svg>
          {!collapsed && <span style={{ fontSize: 12, fontFamily: 'DM Sans' }}>Contraer</span>}
        </button>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: collapsed ? '10px 0' : '10px 12px', marginTop: 4, justifyContent: collapsed ? 'center' : 'flex-start' }}>
          <div style={{ width: 32, height: 32, borderRadius: 10, background: C.blueL, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <span style={{ fontFamily: 'Manrope', fontSize: 12, fontWeight: 700, color: C.blue }}>P</span>
          </div>
          {!collapsed &&
          <div>
              <div style={{ fontSize: 12, fontWeight: 600, color: 'rgba(255,255,255,0.75)', fontFamily: 'Manrope' }}>Psicologo</div>
              <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.3)', fontFamily: 'DM Mono' }}>psicologo@demo.com</div>
            </div>
          }
        </div>
      </div>
    </aside>);

};

/* ─── TOPBAR ─── */
const Topbar = ({ screen }) => {
  const hr = new Date().getHours();
  const g = hr < 12 ? 'Buenos días' : hr < 18 ? 'Buenas tardes' : 'Buenas noches';
  const titles = { dashboard: 'Panel', sessions: 'Nueva sesión', knowledge: 'Biblioteca Clínica', patients: 'Pacientes', schedule: 'Agenda', finance: 'Finanzas', reports: 'Informes', cases: 'Casos' };
  return (
    <header style={{ height: 56, borderBottom: `1px solid ${C.border}`, background: C.paper, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 28px', flexShrink: 0 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
        <span style={{ fontFamily: 'DM Mono', fontSize: 9, color: C.muted, letterSpacing: '0.3em', textTransform: 'uppercase' }}>{g},</span>
        <h1 style={{ fontFamily: 'Manrope', fontSize: 16, fontWeight: 700, color: C.ink }}>{titles[screen] || 'Panel'}</h1>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <button style={{ width: 32, height: 32, borderRadius: 9, border: `1px solid ${C.border}`, background: C.cream, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: C.muted }}>{SVG.bell}</button>
        <button style={{ width: 32, height: 32, borderRadius: 9, border: `1px solid ${C.border}`, background: C.cream, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: C.muted }}>{SVG.settings}</button>
      </div>
    </header>);

};

/* ══════════════════════════════════
   SCREEN: DASHBOARD (compact bento)
══════════════════════════════════ */
const DashboardScreen = ({ setScreen }) => {
  const qActions = [
  { label: 'Nueva sesión', icon: 'mic', color: C.blue, bg: C.blueL, screen: 'sessions' },
  { label: 'Nuevo paciente', icon: 'patients', color: C.green, bg: C.greenL, screen: 'patients' },
  { label: 'Biblioteca', icon: 'book', color: C.purple, bg: C.purpleL, screen: 'knowledge' },
  { label: 'Informes', icon: 'file', color: C.amber, bg: C.amberL, screen: 'reports' }];

  const upcomingSessions = [
  { time: '10:00', day: 'Lun 21', name: 'Mario Salcedo', tag: 'TCC · Sesión 3', first: true },
  { time: '14:00', day: 'Mié 23', name: 'Ana Rodríguez', tag: 'Humanista · Sesión 8', first: false },
  { time: '09:00', day: 'Vie 25', name: 'Carlos Mejía', tag: 'Psicodinámico · Sesión 5', first: false }];

  return (
    <div style={{ display: 'grid', gridTemplateRows: 'auto auto 1fr', gap: 14, height: '100%', padding: '20px 24px 20px' }}>

      {/* ROW 1 — Hero + Stats */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 130px 130px', gap: 12 }} className="fade">
        {/* Greeting hero */}
        <div style={{ background: C.paper, border: `1px solid ${C.border}`, borderRadius: 22, padding: '22px 28px', position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
          <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 2, background: `linear-gradient(90deg,${C.blue},${C.green})` }} />
          <div style={{ position: 'absolute', bottom: -40, right: -20, opacity: .04 }}>{SVG.brain}</div>
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6 }}>
              <div style={{ width: 6, height: 6, borderRadius: '50%', background: C.blue, animation: 'pulse 2s ease-in-out infinite' }} />
              <span style={{ fontFamily: 'DM Mono', fontSize: 9, letterSpacing: '0.35em', textTransform: 'uppercase', color: C.blue, fontWeight: 500 }}>Activo</span>
            </div>
            <div style={{ fontFamily: 'Manrope', fontSize: 42, fontWeight: 800, color: C.ink, lineHeight: .95, marginBottom: 8 }}>psicologo</div>
            <div style={{ fontSize: 12, color: C.muted, lineHeight: 1.5 }}>Transformando la práctica clínica con <strong style={{ color: C.ink }}>precisión e inteligencia</strong>.</div>

const RecorderScreen = () => {
  const [mode, setMode] = useState('presential');
  const [consent, setConsent] = useState(null);
  const [recState, setRecState] = useState('idle'); // idle|recording|paused|done
  const [elapsed, setElapsed] = useState(0);
  const [vuLevels, setVuLevels] = useState(Array(22).fill(0));
  const [patient, setPatient] = useState(PATIENTS[0]);
  const [transcript, setTranscript] = useState('');
  const [aiPanel, setAiPanel] = useState(false);
  const [aiText, setAiText] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [activeTab, setActiveTab] = useState('transcript'); // transcript|ai
  const timerRef = useRef(null);
  const vuRef = useRef(null);
  const sentRef = useRef(null);
  const transcriptRef = useRef(null);

  const SESSION_SENTENCES = [
    'Terapeuta: Buenos días. ¿Cómo ha estado esta semana?',
    '\n\nPaciente: Ha sido una semana bastante difícil. Mucha ansiedad, especialmente en el trabajo.',
    '\n\nTerapeuta: Cuéntame más sobre esa ansiedad. ¿Cuándo aparece con más fuerza?',
    '\n\nPaciente: Principalmente cuando tengo reuniones importantes o cuando siento que no cumpliré con los plazos.',
    '\n\nTerapeuta: ¿Y qué pensamientos acompañan esa sensación de presión?',
    '\n\nPaciente: Que no soy suficiente. Que los demás se van a dar cuenta de que no sé lo que hago.',
    '\n\nTerapeuta: Reconozco ese patrón. ¿Lo hemos trabajado antes en sesiones anteriores?',
    '\n\nPaciente: Sí. Es el mismo pensamiento que siempre regresa, desde pequeño quería cumplir con todo.',
    '\n\nTerapeuta: Parece que el síndrome del impostor está muy presente. Vamos a trabajar eso hoy.',
    '\n\nPaciente: Creo que sí. No sé por qué no puedo simplemente confiar en mí mismo.',
  ];

  useEffect(() => {
    const clear = () => { clearInterval(timerRef.current); clearInterval(vuRef.current); clearTimeout(sentRef.current); };
    if (recState === 'recording') {
      timerRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
      vuRef.current = setInterval(() => setVuLevels(Array(22).fill(0).map(() => Math.random())), 80);
      let idx = 0;
      setTranscript('');
      const addNext = () => {
        if (idx < SESSION_SENTENCES.length) {
          const s = SESSION_SENTENCES[idx++];
          setTranscript(prev => prev + s);
          sentRef.current = setTimeout(addNext, 3000 + Math.random() * 2000);
        }
      };
      sentRef.current = setTimeout(addNext, 1200);
    } else if (recState === 'paused') {
      clearInterval(timerRef.current);
      clearInterval(vuRef.current);
      clearTimeout(sentRef.current);
      setVuLevels(Array(22).fill(0));
    } else if (recState === 'idle' || recState === 'done') {
      clear();
      if (recState === 'idle') setVuLevels(Array(22).fill(0));
    }
    return clear;
  }, [recState]);

  useEffect(() => {
    if (transcriptRef.current) transcriptRef.current.scrollTop = transcriptRef.current.scrollHeight;
  }, [transcript]);

  const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const canRecord = consent === true;
  const vuColor = lvl => lvl > .85 ? '#ef4444' : lvl > .6 ? '#f97316' : '#22c55e';

  const stopRec = () => {
    clearInterval(timerRef.current); clearInterval(vuRef.current); clearTimeout(sentRef.current);
    setVuLevels(Array(22).fill(0)); setRecState('done');
  };

  // ── Downloads ──
  const dlTxt = () => {
    if (!transcript) return;
    const blob = new Blob([transcript], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `Sesion_${patient.name.replace(' ','_')}.txt`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  };

  const dlDocx = () => {
    if (!transcript) return;
    const rows = transcript.split('\n\n').map(l => `<w:p><w:r><w:t>${l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</w:t></w:r></w:p>`).join('');
    const xml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><?mso-application progid="Word.Document"?><w:wordDocument xmlns:w="http://schemas.microsoft.com/office/word/2003/wordml"><w:body><w:p><w:r><w:rPr><w:b/><w:sz w:val="28"/></w:rPr><w:t>Sesión — ${patient.name}</w:t></w:r></w:p><w:p><w:r><w:rPr><w:color w:val="607173"/></w:rPr><w:t>${new Date().toLocaleDateString('es-CO',{year:'numeric',month:'long',day:'numeric'})}</w:t></w:r></w:p><w:p><w:r><w:t> </w:t></w:r></w:p>${rows}</w:body></w:wordDocument>`;
    const blob = new Blob([xml], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `Sesion_${patient.name.replace(' ','_')}.doc`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  };

  const dlPdf = () => {
    if (!transcript) return;
    const w = window.open('','_blank');
    const lines = transcript.split('\n\n').map(l => `<p>${l.replace(/\n/g,'<br>')}</p>`).join('');
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:'Segoe UI',Arial,sans-serif;max-width:800px;margin:40px auto;color:#2E2E2E;line-height:1.75}h1{font-size:22px;margin-bottom:4px}.meta{color:#607173;font-size:12px;margin-bottom:28px;border-bottom:1px solid #eee;padding-bottom:12px}p{font-size:14px;margin-bottom:6px}@media print{body{margin:20mm}}</style></head><body><h1>Sesión — ${patient.name}</h1><div class="meta">${new Date().toLocaleDateString('es-CO',{weekday:'long',year:'numeric',month:'long',day:'numeric'})} · Duración: ${fmt(elapsed)}</div>${lines}</body></html>`);
    w.document.close(); setTimeout(() => w.print(), 400);
  };

  // ── AI Analysis ──
  const analyzeAI = async () => {

Proporciona:
## 1. Patrones y posibles diagnósticos diferenciales
Describe los patrones psicológicos observados, con referencias a manuales (DSM-5/CIE-11) y autores relevantes.

## 2. Técnicas terapéuticas sugeridas
Sugiere intervenciones concretas basadas en TCC, ACT, humanista u otros enfoques pertinentes.

## 3. Puntos clave para próximas sesiones
Lista los aspectos más importantes a explorar y trabajar.

## 4. Observaciones generales
Breve reflexión clínica sobre el proceso terapéutico observado.

Transcripción de la sesión:
${transcript}

Responde en español, de forma profesional y estructurada. Cita autores y referencias cuando sea relevante.` }]
      });
      setAiText(result);
    } catch(e) {
      setAiText('Error al conectar con el análisis IA. Por favor intenta de nuevo.');
    }
    setAiLoading(false);
  };

        {/* LEFT: Setup panels */}

          {/* Patient */}
          <div style={{ background: C.paper, border: `1px solid ${C.border}`, borderRadius: 18, padding: '14px 16px' }}>
            <div style={{ fontFamily: 'DM Mono', fontSize: 8, letterSpacing: '0.3em', textTransform: 'uppercase', color: C.muted, marginBottom: 10 }}>PACIENTE</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {PATIENTS.map(p =>
                <button key={p.id} onClick={() => setPatient(p)} style={{

                  border: `1.5px solid ${patient.id === p.id ? C.blue : C.border}`,
                  background: patient.id === p.id ? C.blueL : C.cream,

                }}>
                  <div style={{ width: 18, height: 18, borderRadius: 5, background: patient.id === p.id ? C.blue : '#B8CACF', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <span style={{ fontSize: 7, fontWeight: 700, color: '#fff' }}>{p.initials}</span>
                  </div>
                  {p.name.split(' ')[0]}
                </button>

            </div>

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "sidebarCollapsed": true,
  "accentColor": "#B56969"
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweaks] = useState(() => ({ ...TWEAK_DEFAULTS, ...(JSON.parse(localStorage.getItem('mtz2-tweaks') || 'null') || {}) }));
  const [screen, setScreen] = useState(() => localStorage.getItem('mtz2-screen') || 'dashboard');
  const [collapsed, setCollapsed] = useState(() => tweaks.sidebarCollapsed || false);
  const [tweakOpen, setTweakOpen] = useState(false);

  useEffect(() => {localStorage.setItem('mtz2-screen', screen);}, [screen]);
  useEffect(() => {
    const t = { ...tweaks, sidebarCollapsed: collapsed };
    localStorage.setItem('mtz2-tweaks', JSON.stringify(t));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: t }, '*');
  }, [tweaks, collapsed]);

  useEffect(() => {
    const fn = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', fn);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', fn);
  }, []);

  const renderScreen = () => {
    if (screen === 'dashboard') return <DashboardScreen setScreen={setScreen} />;
    if (screen === 'sessions') return <RecorderScreen />;
    if (screen === 'knowledge') return <BibliotecaScreen />;
    return <PlaceholderScreen name={{ patients: 'Pacientes', schedule: 'Agenda', finance: 'Finanzas', reports: 'Informes', cases: 'Casos' }[screen] || screen} icon={{ patients: 'patients', schedule: 'calendar', finance: 'dollar', reports: 'file', cases: 'cases' }[screen] || 'home'} />;
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: C.sidebarBg }}>
      <Sidebar screen={screen} setScreen={setScreen} collapsed={collapsed} setCollapsed={setCollapsed} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: C.cream, overflow: 'hidden' }}>
        <Topbar screen={screen} />
        <main style={{ flex: 1, overflowY: 'auto', minHeight: 0 }} className="noscroll">
          {renderScreen()}
        </main>
      </div>

      {/* TWEAKS */}
      {tweakOpen &&
      <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 200, background: C.paper, border: `1px solid ${C.border}`, borderRadius: 18, padding: 18, width: 220, boxShadow: '0 16px 44px rgba(62,129,151,0.14)' }}>
          <div style={{ fontFamily: 'Manrope', fontSize: 13, fontWeight: 700, color: C.ink, marginBottom: 14 }}>Tweaks</div>
          <div style={{ marginBottom: 12 }}>
            <label style={{ fontSize: 11, color: C.muted, display: 'block', marginBottom: 6 }}>Sidebar contraído</label>
            <button onClick={() => setCollapsed(!collapsed)} style={{ padding: '7px 14px', borderRadius: 10, border: `1px solid ${C.border}`, background: collapsed ? C.blue : C.cream, color: collapsed ? '#fff' : C.ink, fontSize: 11, fontWeight: 600, cursor: 'pointer', fontFamily: 'DM Sans' }}>{collapsed ? 'Sí' : 'No'}</button>
          </div>
          <div>
            <label style={{ fontSize: 11, color: C.muted, display: 'block', marginBottom: 6 }}>Acento</label>
            <div style={{ display: 'flex', gap: 6 }}>
              {['#3E8197', '#7F9B79', '#B4895C', '#B56969'].map((c) =>
            <button key={c} onClick={() => setTweaks((t) => ({ ...t, accentColor: c }))} style={{ width: 26, height: 26, borderRadius: 8, background: c, border: tweaks.accentColor === c ? `2px solid ${C.ink}` : '2px solid transparent', cursor: 'pointer' }} />
            )}
            </div>
          </div>
        </div>
      }
    </div>);

};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
